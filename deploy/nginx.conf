# AI 通识课平台生产 Nginx 示例
#
# 使用方式：
# 1. 将前端构建产物复制到 /var/www/tongshi/frontend
# 2. 后端监听 127.0.0.1:8050
# 3. 本地上传目录由 backend/.env 的 LOCAL_UPLOAD_DIR 控制

upstream tongshi_backend {
    server 127.0.0.1:8050;
    keepalive 32;
}

server {
    listen 80;
    server_name example.com;

    root /var/www/tongshi/frontend;
    index index.html;

    client_max_body_size 1024m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        try_files $uri =404;
        expires 7d;
    }

    location /api/ {
        proxy_pass http://tongshi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 兼容历史 /uploads/ 链路；新文件访问优先使用 /api/files/{id}。
    location /uploads/ {
        proxy_pass http://tongshi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
