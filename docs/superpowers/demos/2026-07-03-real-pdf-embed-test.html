<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>真实 PDF 嵌入测试</title>
  <!--
    测试用途，不是正式业务代码。
    使用用户提供的本地 PDF：
    D:\Users\ASUS\Downloads\AI实战：从零精通DeepSeek-第6讲.pdf
  -->
  <style>
    :root {
      --bg: oklch(0.965 0.006 84);
      --panel: oklch(0.992 0.004 84);
      --ink: oklch(0.23 0.026 236);
      --muted: oklch(0.48 0.02 236);
      --line: oklch(0.86 0.012 84);
      --accent: oklch(0.43 0.075 177);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 300px;
    }

    aside {
      padding: 22px 18px;
      background: var(--panel);
      border-right: 1px solid var(--line);
    }

    aside:last-child {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      font-size: 1.05rem;
      line-height: 1.4;
    }

    h2 {
      font-size: 0.95rem;
    }

    p,
    li {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.7;
    }

    .doc-item {
      width: 100%;
      display: grid;
      gap: 4px;
      padding: 12px;
      text-align: left;
      background: color-mix(in oklch, var(--panel) 86%, var(--accent));
      border: 1px solid color-mix(in oklch, var(--accent) 26%, var(--line));
      border-radius: 8px;
    }

    .doc-item strong {
      color: var(--ink);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .doc-item span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 22px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .toolbar h1 {
      margin: 0;
      font-size: 1.18rem;
    }

    .toolbar p {
      margin: 4px 0 0;
      font-size: 0.8rem;
    }

    .open-link {
      flex: 0 0 auto;
      padding: 9px 13px;
      color: var(--panel);
      text-decoration: none;
      background: var(--accent);
      border-radius: 7px;
      font-size: 0.86rem;
      font-weight: 900;
    }

    .pdf-stage {
      min-height: 0;
      padding: 18px;
    }

    .pdf-object {
      width: 100%;
      height: calc(100vh - 112px);
      min-height: 680px;
      display: block;
      background: oklch(0.9 0.006 84);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(28, 34, 36, 0.14);
    }

    .fallback {
      padding: 24px;
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 900px) {
      .layout {
        display: block;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      aside:last-child {
        border-left: 0;
      }

      .toolbar {
        display: grid;
      }

      .open-link {
        text-align: center;
      }

      .pdf-stage {
        padding: 12px;
      }

      .pdf-object {
        height: 72vh;
        min-height: 540px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1>资料目录</h1>
      <button class="doc-item" type="button">
        <strong>AI实战：从零精通DeepSeek-第6讲.pdf</strong>
        <span>真实 PDF · 本地文件 · 约 6.5 MB</span>
      </button>
    </aside>

    <main>
      <header class="toolbar">
        <div>
          <h1>AI实战：从零精通DeepSeek-第6讲</h1>
          <p>这里使用真实 PDF 文件测试页面内嵌阅读效果。</p>
        </div>
        <a class="open-link" href="file:///D:/Users/ASUS/Downloads/AI%E5%AE%9E%E6%88%98%EF%BC%9A%E4%BB%8E%E9%9B%B6%E7%B2%BE%E9%80%9ADeepSeek-%E7%AC%AC6%E8%AE%B2.pdf" target="_blank" rel="noreferrer">新窗口打开</a>
      </header>

      <section class="pdf-stage">
        <object
          class="pdf-object"
          data="file:///D:/Users/ASUS/Downloads/AI%E5%AE%9E%E6%88%98%EF%BC%9A%E4%BB%8E%E9%9B%B6%E7%B2%BE%E9%80%9ADeepSeek-%E7%AC%AC6%E8%AE%B2.pdf"
          type="application/pdf"
        >
          <div class="fallback">
            浏览器无法在页面内直接显示 PDF。请使用“新窗口打开”，或在正式页面中显示下载入口。
          </div>
        </object>
      </section>
    </main>

    <aside>
      <h2>右侧栏测试</h2>
      <p>正式实现时，这里会展示当前文件摘要、篇幅、阅读重点和相关资料。</p>
      <ul>
        <li>文件来源不变：仍来自上传后的 file_id。</li>
        <li>PDF 地址不变：仍由资料文件接口提供。</li>
        <li>如果内嵌失败，需要显示中文降级提示。</li>
      </ul>
    </aside>
  </div>
</body>
</html>
